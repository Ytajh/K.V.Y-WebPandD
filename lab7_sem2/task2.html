<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Завдання 2. Вгадай число</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-card {
            background: #34495e;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #3498db;
        }

        button {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #d35400;
        }
    </style>
</head>

<body>
    <div class="game-card">
        <h1>Гра "Вгадай число"</h1>
        <p>Діапазон: від 0 до 50</p>
        <button onclick="startGame()">Почати гру</button>
    </div>
    <script src="task2.js"></script>
</body>

</html>

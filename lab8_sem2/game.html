<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Chrono Game - Play</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-grey: #b0b0b0;
            --correct-color: #4caf50;
        }

        body {
            background-color: var(--bg-color);
            color: #e0e0e0;
            font-family: 'Consolas', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header-info {
            width: 400px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 20px;
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(5, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
            background-color: #252525;
            padding: 15px;
            border-radius: 4px;
        }

        .cell {
            background-color: var(--card-bg);
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.selected {
            background-color: var(--correct-color);
            color: white !important;
        }

        .controls {
            margin-top: 25px;
        }

        .btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            cursor: pointer;
        }

        #stats-table {
            margin-top: 30px;
            border-collapse: collapse;
            width: 300px;
            text-align: center;
        }

        #stats-table th,
        #stats-table td {
            border: 1px solid #444;
            padding: 8px;
        }

        .best-result {
            background-color: #2e3b2e;
            color: #81c784;
        }
    </style>
</head>

<body>

    <div class="header-info">
        <div>Time: <span id="timer">60</span>с</div>
        <div id="status-msg">Find: 1</div>
    </div>

    <div id="game-grid"></div>

    <div class="controls">
        <button class="btn" onclick="initGame()">Start game from the beginnig</button>
    </div>

    <table id="stats-table">
        <thead>
            <tr>
                <th>Attemp</th>
                <th>Result (second)</th>
            </tr>
        </thead>
        <tbody id="stats-body"></tbody>
    </table>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="game.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Photo Quiz UI - Drag and Drop</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #4caf50;
            --text: #e0e0e0;
            --border: #333;
            --button-hover: #3d3d3d;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Consolas', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #info {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        #current-task-container {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px dashed #555;
            text-align: center;
        }

        .drag-item {
            width: 100px;
            height: 100px;
            cursor: grab;
            border: 2px solid var(--accent);
            z-index: 100;
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(5, 100px);
            gap: 10px;
            background: #252525;
            padding: 15px;
            border-radius: 4px;
        }

        .drop-zone {
            width: 100px;
            height: 100px;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .drop-zone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ui-state-hover {
            border-color: white;
            background: #333;
        }

        .btn {
            margin-top: 30px;
            background-color: var(--card);
            color: var(--text);
            border: 1px solid #555;
            padding: 10px 25px;
            font-family: 'Consolas', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .btn:hover {
            background-color: var(--button-hover);
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.2);
        }
    </style>
</head>

<body>

    <div id="info">Category: <span id="cat-name">...</span> | Score: <span id="score">0</span></div>

    <div id="current-task-container">
        <p>Drag this to the matching image in the grid:</p>
        <img id="main-task" class="drag-item" src="" alt="Task Image">
    </div>

    <div id="game-grid"></div>

    <button id="restart-btn" class="btn">Start Again</button>

    <script src="game.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Photo Quiz - Start</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            border: 1px solid #333;
            padding: 50px;
            border-radius: 8px;
            background-color: #242424;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .start-btn {
            background-color: #3d3d3d;
            color: white;
            border: 1px solid #555;
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            border-radius: 4px;
        }

        .start-btn:hover {
            background-color: #505050;
            border-color: #888;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>PHOTO RECOGNITION</h1>
        <a href="game.html" class="start-btn">Start game</a>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Завдання 2 - Електромережа</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.6;
            padding: 20px;
            background-color: #eef2f3;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #333;
            border-bottom: 2px solid #f7df1e;
            padding-bottom: 10px;
        }

        .result-box {
            background: #f9f9f9;
            padding: 15px;
            border-left: 5px solid #2ecc71;
            margin-top: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Розрахунок енергобалансу міста</h2>
        <p>Натисніть кнопку, щоб розрахувати баланс енергії та фінансові показники для вказаних об'єктів.</p>
        <button onclick="calculateEnergy()">Розрахувати баланс</button>
        <div id="output" class="result-box" style="display:none;"></div>
    </div>
    <script src="task2.js"></script>
</body>

</html>
